<header>

<h1>🐞 Cockroach AI v5</h1>

<p>
Powered by Cockroach AI
</p>

</header>
<!-- ================= CHAT SECTION ================= -->

<section id="chatSection">

<div id="chatArea">

<div class="ai-message">

👋 Welcome to Cockroach AI

<br><br>

How can I help you today?

</div>

</div>

<div class="chatInput">

<textarea
id="prompt"
placeholder="Ask anything..."></textarea>

<button id="sendBtn">

Send

</button>

</div>

</section>

<!-- ================= IMAGE SECTION ================= -->

<section
id="imageSection"
style="display:none;">

<h2>🖼 Image Generator</h2>

<textarea
id="imagePrompt"
placeholder="Describe your image..."></textarea>

<button id="generateImageBtn">

Generate Image

</button>

<div id="imageResult"></div>

</section>

<!-- ================= VIDEO SECTION ================= -->

<section
id="videoSection"
style="display:none;">

<h2>🎬 Video Generator</h2>

<textarea
id="videoPrompt"
placeholder="Describe your video..."></textarea>

<input
type="file"
id="videoImage"
accept="image/*">

<button
id="generateVideoBtn">

Generate Video

</button>

<div id="videoStatus"></div>

<div id="videoResult"></div>

</section>
<!-- ================= MUSIC SECTION ================= -->

<section id="musicSection" style="display:none;">

<h2>🎵 Music AI</h2>

<textarea
id="musicPrompt"
placeholder="Describe your music..."></textarea>

<button id="generateMusicBtn">

Generate Music

</button>

<div id="musicResult"></div>

</section>

<!-- ================= PDF SECTION ================= -->

<section id="pdfSection" style="display:none;">

<h2>📄 PDF Chat</h2>

<input
type="file"
id="pdfFile"
accept=".pdf">

<br><br>

<textarea
id="pdfPrompt"
placeholder="Ask questions from your PDF..."></textarea>

<button id="chatPdfBtn">

Chat with PDF

</button>

<div id="pdfResult"></div>

</section>

<!-- ================= CODE SECTION ================= -->

<section id="codeSection" style="display:none;">

<h2>💻 Code Assistant</h2>

<textarea
id="codePrompt"
placeholder="Paste your code here..."></textarea>

<button id="analyzeCodeBtn">

Analyze Code

</button>

<div id="codeResult"></div>

</section>

<!-- ================= SETTINGS SECTION ================= -->

<section id="settingsSection" style="display:none;">

<h2>⚙ Settings</h2>

<div class="setting-card">

<h3>Credits</h3>

<p id="creditText">1000</p>

</div>

<div class="setting-card">

<h3>Backend</h3>

<p id="backendStatus">Checking...</p>

</div>

<div class="setting-card">

<h3>Version</h3>

<p>Cockroach AI v5</p>

</div>

</section>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
